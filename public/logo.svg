  <!-- Text -->
  <text x="65" y="25" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#1F2937">Eco</text>
  <text x="65" y="45" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#10B981">Glow</text>
  
  <!-- Subtle glow effect -->
